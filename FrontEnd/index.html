<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vote-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cast your vote and watch live results update in real-time." />
    <title>VoteNow — Live Voting</title>
    <!--
      Inline theme script: runs synchronously BEFORE CSS loads.
      Prevents flash of wrong theme (FOWT).
      - Reads localStorage('theme') first
      - Default is dark if nothing stored
      Sets data-theme on <html> so CSS variables resolve correctly.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        if (stored === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
