services:
  api:
    image: ${GHCR_IMAGE}   # Pre-built image pulled from GitHub Container Registry
    container_name: voting_api
    restart: always
    ports:
      - "8071:8071"
    env_file:
      - .env
    environment:
      APP_PORT: "8071"   # Explicitly override to ensure the app always listens on 8071
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./.env:/app/.env:ro   # Mount .env into container (read-only)
    networks:
      - voting_net
      - docker-app_app_network

  mariadb:
    image: mariadb:11.4
    container_name: voting_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      # Persist database data across container restarts
      - mariadb_data:/var/lib/mysql
    networks:
      - voting_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: voting_redis
    restart: always
    networks:
      - voting_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: voting_pma
    restart: always
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "8072:80"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - voting_net
      - docker-app_app_network

volumes:
  mariadb_data:
  uploads_data:

networks:
  voting_net:
    driver: bridge
  docker-app_app_network:
    external: true   # Must already exist on the server (created by the other docker-compose project)
